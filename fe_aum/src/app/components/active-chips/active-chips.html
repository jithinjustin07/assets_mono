<div class="active-chips-slot">
  @if (activeFilters.length > 0) {
    <div class="flex flex-wrap gap-2">
      @for (item of activeFilters; track item.config.key) {
        <span class="chip">
          <span style="color:#94a3b8;margin-right:2px">{{ item.config.label }}:</span>
          {{ item.label }}
          <button (click)="removeChip(item.config.key)" title="Remove">
            <span class="material-icons" style="font-size:12px;line-height:1">close</span>
          </button>
        </span>
      }
    </div>
  }
</div>
<div class="relative w-64 mt-2">
  <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
  <input type="text" placeholder="Search anything..." (input)="onSearch($event)" [value]="svc.searchQuery()"
    class="w-full pl-10 pr-4 py-2 bg-slate-100 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#003366] transition-all" />
</div>
