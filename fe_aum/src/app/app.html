<div class="app-scale bg-[#F8F9FA] text-slate-800 min-h-screen flex flex-col">
  <app-navbar />
  <app-upload-modal />

  <!-- Loading State -->
  @if (isLoading) {
  <div class="flex items-center justify-center min-h-screen">
    <div class="text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#003366] mx-auto mb-4"></div>
      <p class="text-slate-600">Loading AUM Dashboard...</p>
    </div>
  </div>
  } @else {

  <!-- Main: full-width, vertical layout. Content row below header contains aside (filter) and section (table/content) -->
  <main class="flex-1 pt-4 pb-10 px-0 w-full flex flex-col">
    <app-dashboard-header />

     Global search input above active chips
    <div class="relative w-64 mb-2">
      <span
        class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
      <input type="text" placeholder="Search anything..." (input)="svc.setSearchQuery($event)" [value]="svc.searchQuery()"
        class="w-full pl-10 pr-4 py-2 bg-slate-100 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#003366] transition-all" />
    </div>

    <!-- Place active chips & kpi above the two-column content so filter aligns with table only -->
    <app-active-chips />
    <!-- <app-kpi-cards /> -->

    <div class="content-row flex w-full">
      <!-- Aside at extreme left with 1px left margin from viewport -->
      <aside class="filter-aside">
        <app-filter-modal></app-filter-modal>
      </aside>

      <!-- Table/content section takes remaining width -->
      <section class="flex-1">
        <app-data-table />
      </section>
    </div>
  </main>
</div>
